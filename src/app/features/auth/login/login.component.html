<div class="min-h-screen bg-hp-dark flex items-center justify-center p-4">

  <!-- Estrellas de fondo -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_#1a1a35_0%,_#09090f_70%)]"></div>
    <div class="absolute top-1/4 left-1/3 w-1 h-1 bg-hp-gold rounded-full opacity-60 animate-pulse"></div>
    <div class="absolute top-1/3 right-1/4 w-1 h-1 bg-white rounded-full opacity-40 animate-pulse" style="animation-delay:.8s"></div>
    <div class="absolute top-2/3 left-1/5 w-1 h-1 bg-hp-gold rounded-full opacity-50 animate-pulse" style="animation-delay:1.4s"></div>
    <div class="absolute top-1/2 right-1/3 w-1 h-1 bg-white rounded-full opacity-30 animate-pulse" style="animation-delay:.3s"></div>
    <div class="absolute bottom-1/4 left-2/3 w-1 h-1 bg-hp-gold rounded-full opacity-40 animate-pulse" style="animation-delay:2s"></div>
  </div>

  <!-- Card -->
  <div class="relative w-full max-w-md animate-slide-up">
    <div class="hp-card p-8 shadow-2xl shadow-black/50">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="w-12 h-12 mx-auto mb-3 text-hp-gold">
          <lucide-icon name="zap" class="w-12 h-12"></lucide-icon>
        </div>
        <h1 class="text-2xl font-heading text-hp-gold tracking-wider">Horrocruxes</h1>
        <p class="text-hp-muted text-sm mt-1">The magical world awaits you</p>
      </div>

      <!-- Error -->
      @if (error()) {
        <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm animate-fade-in">
          {{ error() }}
        </div>
      }

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

        <div>
          <label class="block text-sm text-gray-400 mb-1.5">Email</label>
          <input
            type="email"
            formControlName="email"
            placeholder="harry@hogwarts.com"
            class="hp-input"
            autocomplete="email"
          />
          <p class="error-msg" [class.invisible]="!(email.invalid && email.touched)">Please enter a valid email.</p>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1.5">Password</label>
          <div class="relative">
            <input
              [type]="showPwd() ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              class="hp-input pr-10"
              autocomplete="current-password"
            />
            <button
              type="button"
              (click)="showPwd.set(!showPwd())"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-hp-muted hover:text-gray-300 transition-colors"
            >
              <lucide-icon [name]="showPwd() ? 'eye-off' : 'eye'" class="w-5 h-5"></lucide-icon>
            </button>
          </div>
          <p class="error-msg" [class.invisible]="!(password.invalid && password.touched)">Minimum 8 characters.</p>
        </div>


        <button type="submit" [disabled]="loading()" class="hp-btn-primary mt-2">
          @if (loading()) {
            <span class="flex items-center justify-center gap-2">
              <span class="w-4 h-4 border-2 border-hp-dark/30 border-t-hp-dark rounded-full animate-spin"></span>
              Signing in...
            </span>
          } @else {
            Enter the Castle
          }
        </button>

      </form>

      <!-- Footer -->
      <p class="text-center text-hp-muted text-sm mt-6">
        Don't have an account?
        <a routerLink="/auth/register" class="hp-btn-ghost ml-1">Sign up</a>
      </p>

    </div>

    <!-- Bottom decoration -->
    <div class="mt-4 text-center flex items-center justify-center gap-3">
      <lucide-icon name="star" class="w-3 h-3 text-hp-border"></lucide-icon>
      <p class="text-hp-border text-xs font-heading tracking-widest">DRACO DORMIENS NUNQUAM TITILLANDUS</p>
      <lucide-icon name="star" class="w-3 h-3 text-hp-border"></lucide-icon>
    </div>
  </div>
</div>
